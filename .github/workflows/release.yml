name: Release Assets

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Download Decky CLI
        run: |
          mkdir -p cli
          curl -L -o cli/decky \
            https://github.com/SteamDeckHomebrew/cli/releases/latest/download/decky-linux-x86_64
          chmod +x cli/decky

      - name: Build plugin
        run: sudo ./cli/decky plugin build .

      - name: Get plugin info
        id: plugin_info
        run: |
          PLUGIN_NAME=$(jq -r '.name' plugin.json)
          echo "name=$PLUGIN_NAME" >> $GITHUB_OUTPUT

      - name: Upload artifact to release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: out/${{ steps.plugin_info.outputs.name }}.zip
          asset_name: ${{ steps.plugin_info.outputs.name }}.zip
          asset_content_type: application/zip

      # Must run before the CN step: release-cn.sh rebuilds out/, so read the pristine normal zip here.
      - name: Build full (self-contained) zip
        run: bash scripts/full-package.sh

      - name: Upload full zip to release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: Decky.Music.full.zip
          asset_name: Decky.Music.full.zip
          asset_content_type: application/zip

      - name: Mirror binaries + build & upload CN zip to R2
        env:
          TAG: ${{ github.event.release.tag_name }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: bash scripts/release-cn.sh

      - name: Upload CN zip to release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: Decky.Music.cn.zip
          asset_name: Decky.Music.cn.zip
          asset_content_type: application/zip
